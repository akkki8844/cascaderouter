# Builds the submission image (linux/amd64, as the judging VM requires) and
# pushes it to GitHub Container Registry. No local Docker needed — this is
# the canonical build path for the Track 1 artifact.
#
# Resulting image: ghcr.io/<owner>/<repo>:latest
# NOTE: the GHCR package must be set to PUBLIC before submitting
# (repo → Packages → package settings → Change visibility).
name: build-submission-image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # The image bakes two Ollama models (~2.5 GB); reclaim runner disk first.
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Report image size
        run: |
          docker pull ${{ steps.image.outputs.name }}:latest
          docker image inspect ${{ steps.image.outputs.name }}:latest --format 'Uncompressed size: {{.Size}} bytes'
